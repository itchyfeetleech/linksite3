<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="HoppCX — personnel record. A RobCo-style CRT terminal bioprofile.">
  <meta name="theme-color" content="#070b07">
  <title>HOPPCX // TERMLINK</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☢</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-theme="green" class="cold">

  <!-- ── The room: perspective camera → parallax tilt → design canvas ── -->
  <div id="viewport">
    <div id="tilt">
      <div id="scene">

        <!-- back wall, lit faintly by the tube -->
        <div id="wall" aria-hidden="true"></div>

        <!-- desk surface + phosphor light spilling onto it -->
        <div id="desk" aria-hidden="true"></div>
        <div id="desk-glow" aria-hidden="true"></div>

        <!-- power cable snaking off the desk -->
        <svg id="cable" aria-hidden="true" viewBox="0 0 520 460" width="520" height="460">
          <path d="M 30 30 C 120 60, 150 180, 240 240 S 430 330, 510 450"
                fill="none" stroke="#101110" stroke-width="16" stroke-linecap="round"/>
          <path d="M 30 30 C 120 60, 150 180, 240 240 S 430 330, 510 450"
                fill="none" stroke="#2a2c26" stroke-width="5" stroke-linecap="round" opacity=".5"/>
        </svg>

        <!-- ── The monitor ──────────────────────────────────────── -->
        <div id="crt">
          <div class="crt-vents" aria-hidden="true"></div>

          <div class="crt-bezel">
            <div id="screen">

              <!-- Phosphor layer: everything readable lives here -->
              <div id="phosphor">
                <div id="boot" class="boot" aria-live="polite"></div>

                <div id="ui" hidden>
                  <header id="hdr">
                    <div class="hdr-row">
                      <span>ROBCO INDUSTRIES (TM) TERMLINK PROTOCOL</span>
                      <span class="hdr-right">UPLINK: <span class="ok">SECURE</span></span>
                    </div>
                    <div class="hdr-row hdr-sub">
                      <span id="hdr-file">PERSONNEL FILE // LOADING…</span>
                      <span class="hdr-right" id="clock" aria-hidden="true"></span>
                    </div>
                    <nav id="tabs" aria-label="Sections"></nav>
                  </header>

                  <main id="page" tabindex="-1"></main>

                  <div id="promptline" title="Type a command — try HELP">
                    <span class="ps1" aria-hidden="true">&gt;</span><span id="cli-mirror"></span><span class="cursor" aria-hidden="true"></span>
                    <input id="cli" autocomplete="off" autocapitalize="off" spellcheck="false"
                           aria-label="Terminal command input. Type HELP for a list of commands." maxlength="64">
                  </div>

                  <footer id="ftr">
                    <button class="chip" id="chip-sound" title="Toggle sound">SND --</button>
                    <button class="chip" id="chip-theme" title="Cycle phosphor theme">THM --</button>
                    <button class="chip" id="chip-view" title="Dolly the camera in / out">VIEW --</button>
                    <button class="chip" id="chip-fx" title="Toggle CRT effects (plain terminal view)">FX --</button>
                    <span class="chip chip-static">HP 100/100</span>
                    <span class="chip chip-static">LVL 27</span>
                    <span class="chip chip-grow" id="chip-hint">TYPE "HELP" FOR COMMANDS</span>
                  </footer>
                </div>
              </div>

              <!-- CRT effect overlays (purely decorative) -->
              <div class="fx fx-aperture" aria-hidden="true"></div>
              <div class="fx fx-scan" aria-hidden="true"></div>
              <div class="fx fx-sweep" aria-hidden="true"></div>
              <canvas id="noise" class="fx" width="160" height="120" aria-hidden="true"></canvas>
              <div class="fx fx-glare" aria-hidden="true"></div>
              <div class="fx fx-vignette" aria-hidden="true"></div>
              <div class="fx fx-frame" aria-hidden="true"></div>
            </div>
          </div>

          <div id="chin">
            <span class="led" aria-hidden="true"></span>
            <button id="power" title="Power" aria-label="Power-cycle the monitor"></button>
            <span class="knob" title="BRIGHTNESS" aria-hidden="true"></span>
            <span class="knob knob-b" title="CONTRAST" aria-hidden="true"></span>
            <span class="brand">ROBCO&nbsp;RT-3000&nbsp;&nbsp;·&nbsp;&nbsp;UNIFIED&nbsp;OPERATING&nbsp;SYSTEM</span>
            <span class="model">EST.&nbsp;2077</span>
          </div>
        </div>

        <!-- ── Desk props ───────────────────────────────────────── -->
        <div id="kbd" aria-hidden="true">
          <div class="kbd-keys"></div>
          <div class="kbd-space"></div>
        </div>
        <div class="prop prop-mug" aria-hidden="true"></div>
        <div class="prop prop-note" aria-hidden="true"></div>
        <div class="prop prop-holotape" aria-hidden="true"></div>

      </div>
    </div>
  </div>

  <noscript>
    <div class="noscript">
      <h1>[ TERMINAL OFFLINE ]</h1>
      <p>This terminal requires JavaScript to boot.</p>
      <p>youtube.com/@HoppCX</p>
    </div>
  </noscript>

  <script type="module" src="js/main.js"></script>
</body>
</html>
